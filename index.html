<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi Music Downloader</title>
    <link rel="stylesheet" href="/static/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Dark/Light Mode">
        <svg id="sun-icon" class="icon sun-icon" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
        <svg id="moon-icon" class="icon moon-icon" viewBox="0 0 24 24"><path d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
    </button>

    <div class="card-container">
        
        <header class="card-header">
            <h1 class="header-title">Music Downloader</h1>
            <p class="header-subtitle">YT Music &bull; High Quality MP3</p>
        </header>

        <div class="card-body">
            <form id="download-form" class="form-group">
                
                <label for="url" class="form-label">Music URL</label>
                <input type="text" id="url" name="url" placeholder="Paste link here..." required class="input-field">

                <div class="download-type-group">
                    <label class="form-label">Download Type</label>
                    <div class="toggle-group">
                        <label class="toggle-option">
                            <input type="radio" name="type" value="single" checked>
                            <span class="toggle-label">Single Song</span>
                        </label>
                        <label class="toggle-option">
                            <input type="radio" name="type" value="playlist">
                            <span class="toggle-label">Playlist (Blocked for Direct Download)</span>
                        </label>
                    </div>
                </div>

                <button type="submit" id="submit-btn" class="submit-button">
                    <span class="button-text">Start Download</span>
                    <span class="loading-spinner"></span>
                </button>
            </form>

            <div id="status-bar" class="status-bar hidden">
                <div id="status-message"></div>
            </div>

            <section id="download-progress-container" class="progress-container hidden">
                <div class="progress-header">
                    <span id="progress-icon" class="progress-icon">🎧</span>
                    <span id="progress-text" class="progress-text">Initializing Download...</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
            </section>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
